name: Build sfd_tool

on:
  workflow_dispatch:
  push:
    branches:
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 40
    env:
      VCPKG_ROOT: C:\vcpkg
    strategy:
      matrix:
        include:
          # x64 架构：libusb 驱动版（vcpkg 只安装 gettext，libusb 使用项目自带）
          - arch: x64
            config: Release
            msys_gtk_arch: mingw64
            cmake_platform: x64
            use_libusb: ON
            vcpkg_triplet: x64-windows
            artifact_name: LibUSB
          
          # x64 架构：SPRD 原生驱动版（不使用 vcpkg，从 MSYS2 手动获取 GTK+gettext）
          - arch: x64
            config: Release
            msys_gtk_arch: mingw64
            cmake_platform: x64
            use_libusb: OFF
            vcpkg_triplet: x64-windows
            artifact_name: SPRD
          
          # x86 架构：SPRD Bridge
          - arch: x86
            config: Release
            cmake_platform: Win32
            use_libusb: OFF
            artifact_name: Bridge

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup MSVS
        uses: TheMrMilchmann/setup-msvc-dev@v3
        with:
          arch: ${{ matrix.arch }}

      - name: Install gettext (libintl) via vcpkg
        if: matrix.artifact_name != 'Bridge'
        shell: pwsh
        run: |
          $vcpkgExe = "C:\vcpkg\vcpkg.exe"
          if (-not (Test-Path $vcpkgExe)) {
            Write-Error "vcpkg.exe not found at $vcpkgExe"
            exit 1
          }
          Write-Host "Using vcpkg: $vcpkgExe"
          & $vcpkgExe install "gettext:${{ matrix.vcpkg_triplet }}"

      - name: Install MSYS2 and GTK4 (x64)
        if: matrix.arch == 'x64'
        shell: pwsh
        run: |
          $msysPath = "C:\msys64"
          & "$msysPath\usr\bin\bash.exe" -lc "pacman -Sy --noconfirm"
          & "$msysPath\usr\bin\bash.exe" -lc "pacman -S --noconfirm --needed mingw-w64-x86_64-gtk4 mingw-w64-x86_64-toolchain mingw-w64-x86_64-pkg-config"

      - name: Install MSYS2 and GTK4 (x86)
        if: matrix.arch == 'x86' && matrix.artifact_name != 'Bridge'
        shell: pwsh
        run: |
          $msysPath = "C:\msys64"

          Write-Host "安装 GTK4 开发包..."
          & "$msysPath\usr\bin\bash.exe" -lc "pacman -Sy --noconfirm"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          Write-Host "从Github源下载安装 GTK4 及依赖 (x86)..."
          $pkgCache = "$msysPath\var\cache\pacman\pkg"
          New-Item -ItemType Directory -Force -Path $pkgCache | Out-Null
          $mirrorBase = "https://github.com/C-Hidery/mingw32_msys2_gtk4_4.16.12_backup/raw/refs/heads/master/"
          $pkgFiles = @(
            "mingw-w64-i686-glib2-2.82.4-1-any.pkg.tar.zst",
            "mingw-w64-i686-cairo-1.18.2-2-any.pkg.tar.zst",
            "mingw-w64-i686-libdatrie-docs-0.2.13-3-any.pkg.tar.zst",
            "mingw-w64-i686-libdatrie-0.2.14-1-any.pkg.tar.zst",
            "mingw-w64-i686-libthai-0.1.30-1-any.pkg.tar.zst",
            "mingw-w64-i686-pango-1.56.1-1-any.pkg.tar.zst",
            "mingw-w64-i686-freetype-2.13.2-1-any.pkg.tar.zst",
            "mingw-w64-i686-harfbuzz-10.1.0-1-any.pkg.tar.zst",
            "mingw-w64-i686-gdk-pixbuf2-2.42.12-1-any.pkg.tar.zst",
            "mingw-w64-i686-atk-2.52.0-1-any.pkg.tar.zst",
            "mingw-w64-i686-fontconfig-2.15.0-2-any.pkg.tar.zst",
            "mingw-w64-i686-libpng-1.6.43-1-any.pkg.tar.zst",
            "mingw-w64-i686-libjpeg-turbo-3.0.3-1-any.pkg.tar.zst",
            "mingw-w64-i686-libwebp-1.6.0-1-any.pkg.tar.zst",
            "mingw-w64-i686-libtiff-4.6.0-1-any.pkg.tar.zst",
            "mingw-w64-i686-libxml2-2.12.10-1-any.pkg.tar.zst",
            "mingw-w64-i686-zlib-1.3.1-1-any.pkg.tar.zst",
            "mingw-w64-i686-hicolor-icon-theme-0.18-1-any.pkg.tar.zst",
            "mingw-w64-i686-egl-headers-1.5.r255.9ab6036-1-any.pkg.tar.zst",
            "mingw-w64-i686-libepoxy-1.5.10-5-any.pkg.tar.zst",
            "mingw-w64-i686-adwaita-icon-theme-legacy-46.2-1-any.pkg.tar.zst",
            "mingw-w64-i686-librsvg-2.58.0-1-any.pkg.tar.zst",
            "mingw-w64-i686-adwaita-icon-theme-49.0-1-any.pkg.tar.zst",
            "mingw-w64-i686-gtk-update-icon-cache-3.24.43-1-any.pkg.tar.zst",
            "mingw-w64-i686-json-glib-1.10.8-2-any.pkg.tar.zst",
            "mingw-w64-i686-shared-mime-info-2.4-4-any.pkg.tar.zst",
            "mingw-w64-i686-graphene-1.10.8-2-any.pkg.tar.zst",
            "mingw-w64-i686-gtk4-4.16.12-2-any.pkg.tar.zst"
          )
          $tempDir = Join-Path $env:TEMP "msys2_pkgs"
          New-Item -ItemType Directory -Force -Path $tempDir | Out-Null
          foreach ($pkgFile in $pkgFiles) {
            $pkgUrl = "$mirrorBase/$pkgFile"
            $localFile = Join-Path $tempDir $pkgFile
            Write-Host "下载 $pkgUrl"
            Invoke-WebRequest -Uri $pkgUrl -OutFile $localFile -UseBasicParsing
          }
          Move-Item "$tempDir\*.pkg.tar.zst" $pkgCache -Force
          $pkgCacheUnix = $pkgCache -replace '\\', '/' -replace '^C:', '/c'
          & "$msysPath\usr\bin\bash.exe" -lc "pacman -U --noconfirm --overwrite='*' $pkgCacheUnix/mingw-w64-i686-*.pkg.tar.zst"
          & "$msysPath\usr\bin\bash.exe" -lc "pacman -S --noconfirm --needed mingw-w64-i686-tools"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE } 

      - name: Create Build Directory
        shell: pwsh
        run: New-Item -ItemType Directory -Force -Path ./build/${{ matrix.artifact_name }}/${{ matrix.config }}/ | Out-Null

      - name: Configure (CMake)
        if: matrix.artifact_name != 'Bridge'
        shell: pwsh
        run: |
          $env:Path = "C:\msys64\usr\bin;" + $env:Path
          cmake -S . -B build_cmake `
            -G "Visual Studio 18 2026" `
            -A ${{ matrix.cmake_platform }} `
            -DCMAKE_TOOLCHAIN_FILE="C:/vcpkg/scripts/buildsystems/vcpkg.cmake" `
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON `
            -DUSE_GTK=ON `
            -DUSE_LIBUSB=${{ matrix.use_libusb }} `
            -DSFD_ENABLE_TESTS=ON

      - name: Configure (CMake) - Bridge
        if: matrix.artifact_name == 'Bridge'
        shell: pwsh
        run: |
          $env:Path = "C:\msys64\usr\bin;" + $env:Path
          cmake -S ./Bridge -B build_cmake `
            -G "Visual Studio 18 2026" `
            -A ${{ matrix.cmake_platform }} `
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON `

      - name: Build (${{ matrix.artifact_name }} - ${{ matrix.config }})
        if: matrix.artifact_name != 'Bridge'
        shell: pwsh
        run: |
          $env:Path = "C:\msys64\${{ matrix.msys_gtk_arch }}\bin;" + $env:Path
          if ("${{ matrix.arch }}" -eq "x64") {
            $env:Path = "C:\vcpkg\installed\${{ matrix.vcpkg_triplet }}\bin;" + $env:Path
          }
          cmake --build build_cmake --config ${{ matrix.config }} -- /m
          ctest --test-dir build_cmake -C ${{ matrix.config }} --output-on-failure
          Copy-Item "build_cmake/${{ matrix.config }}/sfd_tool.exe" "./build/${{ matrix.artifact_name }}/${{ matrix.config }}/" -Force
      
      - name: Build (${{ matrix.artifact_name }} - ${{ matrix.config }}) - Bridge
        if: matrix.artifact_name == 'Bridge'
        shell: pwsh
        run: |
          cmake --build build_cmake --config ${{ matrix.config }} -- /m
          Copy-Item "build_cmake/${{ matrix.config }}/Bridge.exe" "./build/${{ matrix.artifact_name }}/${{ matrix.config }}/" -Force

      - name: Copy gettext runtime DLLs
        if: matrix.artifact_name != 'Bridge'
        shell: pwsh
        run: |
          $destDir = "./build/${{ matrix.artifact_name }}/${{ matrix.config }}/"
          $vcpkgBin = "C:\vcpkg\installed\${{ matrix.vcpkg_triplet }}\bin"
          if (Test-Path $vcpkgBin) {
            Get-ChildItem $vcpkgBin -Filter "*.dll" | ForEach-Object {
              Copy-Item $_.FullName -Destination $destDir -Force
            }
          }
         
      - name: Copy libusb DLL from project (x64 only)
        if: matrix.use_libusb == 'ON'
        run: |
          $destDir = "./build/${{ matrix.artifact_name }}/${{ matrix.config }}/"
          $libusbPath = "third_party/Lib/libusb-1.0.dll"
          if (Test-Path $libusbPath) {
            Copy-Item $libusbPath -Destination $destDir -Force
            Copy-Item "docs/VERSION_LOG.md" -Destination $destDir -Force
          }

      - name: Copy SPRD Driver Files (x86 only)
        if: matrix.use_libusb == 'OFF'
        run: |
          $destDir = "./build/${{ matrix.artifact_name }}/${{ matrix.config }}/"
          if (Test-Path "third_party/Lib/Channel9.dll") {
            Copy-Item "third_party/Lib/Channel9.dll" -Destination $destDir -Force
          }
          if (Test-Path "third_party/Lib/Channel.ini") {
            Copy-Item "third_party/Lib/Channel.ini" -Destination $destDir -Force
          }
          Copy-Item "docs/VERSION_LOG.md" -Destination $destDir -Force

      - name: Copy ALL DLLs from MSYS2 bin directory
        if: matrix.artifact_name != 'Bridge'
        run: |
          $destDir = "./build/${{ matrix.artifact_name }}/${{ matrix.config }}/"
          
          # 确定 GTK4 bin 目录
          if ("${{ matrix.arch }}" -eq "x64") {
            $gtkBinPath = "C:\msys64\mingw64\bin"
          } else {
            $gtkBinPath = "C:\msys64\mingw32\bin"
          }
          
          Write-Host "复制所有 DLL 从: $gtkBinPath"
          Write-Host "复制到: $destDir"
          
          # 检查源目录是否存在
          if (-not (Test-Path $gtkBinPath)) {
            Write-Error "GTK4 bin 目录不存在: $gtkBinPath"
            exit 1
          }
          
          # 复制所有 DLL 文件
          $dllFiles = Get-ChildItem -Path $gtkBinPath -Filter "*.dll"
          
          if ($dllFiles.Count -eq 0) {
            Write-Warning "没有找到 DLL 文件！"
            Write-Host "目录内容:"
            Get-ChildItem -Path $gtkBinPath | Select-Object -First 20
          } else {
            foreach ($dll in $dllFiles) {
              Copy-Item $dll.FullName -Destination $destDir -Force
            }
            Write-Host "已复制 $($dllFiles.Count) 个 DLL 文件"
            
            # 显示前10个复制的文件
            Write-Host "前10个 DLL 文件:"
            $dllFiles | Select-Object -First 10 Name | ForEach-Object { Write-Host "  - $($_.Name)" }
          }
      - name: Copy GTK Runtime Data Files
        if: matrix.artifact_name != 'Bridge'
        run: |
          $destDir = "./build/${{ matrix.artifact_name }}/${{ matrix.config }}/"
          
          # 确定 MSYS2 目录
          if ("${{ matrix.arch }}" -eq "x64") {
            $msysPrefix = "C:\msys64\mingw64"
          } else {
            $msysPrefix = "C:\msys64\mingw32"
          }
          
          Write-Host "复制 GTK 运行时数据文件..."
          
          # 1. 复制图标主题
          $iconsSrc = "$msysPrefix\share\icons"
          $iconsDest = "$destDir\share\icons"
          
          if (Test-Path $iconsSrc) {
            New-Item -ItemType Directory -Force -Path $iconsDest
            
            # 复制 hicolor 主题（必需）
            if (Test-Path "$iconsSrc\hicolor") {
              Write-Host "复制 hicolor 图标主题..."
              Copy-Item -Path "$iconsSrc\hicolor" -Destination $iconsDest -Recurse -Force
            }
            
            # 复制 Adwaita 主题（推荐）
            if (Test-Path "$iconsSrc\Adwaita") {
              Write-Host "复制 Adwaita 图标主题..."
              Copy-Item -Path "$iconsSrc\Adwaita" -Destination $iconsDest -Recurse -Force
            }
          } else {
            Write-Warning "图标主题目录不存在: $iconsSrc"
          }
          
          # 2. 复制 GSettings schemas
          $schemasSrc = "$msysPrefix\share\glib-2.0\schemas"
          $schemasDest = "$destDir\share\glib-2.0\schemas"
          
          if (Test-Path $schemasSrc) {
            Write-Host "复制 GSettings schemas..."
            New-Item -ItemType Directory -Force -Path $schemasDest
            Copy-Item -Path "$schemasSrc\*" -Destination $schemasDest -Recurse -Force
          } else {
            Write-Error "GSettings schemas 目录不存在: $schemasSrc"
          }
          
          # 3. 复制主题
          $themesSrc = "$msysPrefix\share\themes"
          $themesDest = "$destDir\share\themes"
          
          if (Test-Path $themesSrc) {
            Write-Host "复制 GTK 主题..."
            New-Item -ItemType Directory -Force -Path $themesDest
            Copy-Item -Path "$themesSrc\Default" -Destination $themesDest -Recurse -Force -ErrorAction SilentlyContinue
          }
          $gdkPixbufSrc = "$msysPrefix\lib\gdk-pixbuf-2.0"
          if (Test-Path $gdkPixbufSrc) {
            Write-Host "复制 pixbuf"
            $gdkPixbufDest = "$destDir\lib\gdk-pixbuf-2.0"
            New-Item -ItemType Directory -Force -Path $gdkPixbufDest | Out-Null
            Copy-Item -Path "$gdkPixbufSrc\*" -Destination $gdkPixbufDest -Recurse -Force
          }
      - name: Copy locale (.mo) files
        if: matrix.artifact_name != 'Bridge'
        run: |
          $destDir = "./build/${{ matrix.artifact_name }}/${{ matrix.config }}/locale/zh_CN/LC_MESSAGES"
          New-Item -ItemType Directory -Force -Path $destDir | Out-Null
          $srcMo = "build_cmake/locale/zh_CN/LC_MESSAGES/sfd_tool.mo"
          if (Test-Path $srcMo) {
            Copy-Item $srcMo -Destination $destDir -Force
          }

      - name: Cleanup Build Directory
        run: |
          $destDir = "./build/${{ matrix.artifact_name }}/${{ matrix.config }}/"
          $unwantedExtensions = @(".a", ".la", ".def", ".sh", ".py", ".pl", ".exp")
          $keepFiles = @("sfd_tool.exe", "Bridge.exe", "sfd_tool.pdb", "BMPlatform.dll", "Channel9.dll", "Channel.ini", "libusb-1.0.dll")
          foreach ($ext in $unwantedExtensions) {
            Get-ChildItem -Path $destDir -Filter "*$ext" -Exclude $keepFiles -ErrorAction SilentlyContinue | 
              Remove-Item -Force -ErrorAction SilentlyContinue
          }

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sfd_tool_${{ matrix.artifact_name }}_${{ matrix.config }}
          path: ./build/${{ matrix.artifact_name }}/${{ matrix.config }}/

  # ==================== macOS 构建（保持不变）====================
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 30
    env:
      MACOSX_DEPLOYMENT_TARGET: '11.0'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install macOS Build Dependencies
        run: |
          brew update
          for pkg in gtk4 libusb gettext cmake ninja; do
            if ! brew list "$pkg" >/dev/null 2>&1; then
              brew install "$pkg"
            fi
          done

      - name: Configure (CMake)
        run: |
          mkdir -p build_cmake
          cmake -S . -B build_cmake \
            -G "Ninja" \
            -DCMAKE_BUILD_TYPE=Release \
            -DUSE_GTK=ON \
            -DUSE_LIBUSB=ON \
            -DSFD_ENABLE_TESTS=ON \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0

      - name: Build and Test
        run: |
          cmake --build build_cmake --config Release -- -j$(sysctl -n hw.logicalcpu)
          ctest --test-dir build_cmake -C Release --output-on-failure

      - name: Build self-contained macOS app & DMG
        run: |
          chmod +x scripts/release.sh scripts/build_macos_app.sh 2>/dev/null || true
          ./scripts/release.sh 2>/dev/null || true
          ./scripts/build_macos_app.sh 2>/dev/null || true

      - name: Upload macOS DMG Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sfd_tool_macos_dmg
          path: dist/*.dmg

  # ==================== Linux DEB 构建（保持不变）====================
  build-linux-deb:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Linux Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential debhelper devscripts \
            libgtk-4-dev libusb-1.0-0-dev pkg-config g++ \
            imagemagick desktop-file-utils cmake

      - name: Build Linux Package
        run: |
          export DEBFULLNAME="RyanCrepa"
          export DEBEMAIL="Ryan110413@outlook.com"
          chmod +x packaging/build-deb.sh
          ./packaging/build-deb.sh

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sfd_tool_linux_deb
          path: |
            /tmp/build-sfd-tool/*.deb
            /tmp/build-sfd-tool/*.rpm

  # ==================== Linux RPM 构建（保持不变）====================
  build-linux-rpm:
    runs-on: ubuntu-latest
    container:
      image: fedora:latest
    timeout-minutes: 20
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install RPM Build Dependencies
        run: |
          dnf update -y
          dnf install -y rpm-build gcc-c++ gtk4-devel libusb1-devel libusb1 \
            pkgconf-pkg-config make ImageMagick desktop-file-utils \
            gtk-update-icon-cache which cmake ninja-build

      - name: Build RPM
        run: |
          chmod +x packaging/build-rpm.sh
          ./packaging/build-rpm.sh
          
      - name: Upload RPM Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sfd_tool_rpm_package
          path: |
            ~/rpmbuild/RPMS/*/*.rpm

  # ==================== Windows 安装程序打包 ====================
  package-windows:
    runs-on: windows-latest
    needs: build-windows
    strategy:
      matrix:
        include:
          - artifact_name: LibUSB
            arch_display: x64
          - artifact_name: SPRD
            arch_display: x64
    steps:
      - uses: actions/checkout@v4

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Build Artifacts
        uses: actions/download-artifact@v4
        with:
          name: sfd_tool_${{ matrix.artifact_name }}_Release
          path: ./app

      - name: Download Bridge Artifact
        if: matrix.artifact_name == 'SPRD'
        uses: actions/download-artifact@v4
        with:
          name: sfd_tool_Bridge_Release
          path: ./bridge

      - name: Copy Bridge.exe into SPRD Release
        if: matrix.artifact_name == 'SPRD'
        shell: pwsh
        run: |
          $bridgeExe = "./bridge/Bridge.exe"
          $destDir = "./app/"
          
          if (Test-Path $bridgeExe) {
            Copy-Item $bridgeExe -Destination $destDir -Force
            Write-Host "Bridge.exe copied successfully to $destDir"
          } else {
            Write-Warning "Bridge.exe not found at $bridgeExe"
            # 尝试查找其他可能的位置
            $found = Get-ChildItem -Path . -Filter "Bridge.exe" -Recurse | Select-Object -First 1
            if ($found) {
              Copy-Item $found.FullName -Destination $destDir -Force
              Write-Host "Bridge.exe found at $($found.FullName) and copied"
            } else {
              Write-Error "Bridge.exe not found anywhere!"
              exit 1
            }
          }

      - name: Verify SPRD Release contents
        if: matrix.artifact_name == 'SPRD'
        shell: pwsh
        run: |
          Write-Host "SPRD Release contents:"
          Get-ChildItem -Path ./app -Recurse | ForEach-Object {
            Write-Host "  $($_.FullName)"
          }
          # 验证关键文件是否存在
          $requiredFiles = @("sfd_tool.exe", "Channel9.dll", "Bridge.exe")
          foreach ($file in $requiredFiles) {
            $found = Get-ChildItem -Path ./app -Filter $file -Recurse
            if ($found) {
              Write-Host "$file found"
            } else {
              Write-Error "$file NOT found!"
            }
          }

      - name: Create Inno Setup Script
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $arch = "${{ matrix.arch_display }}"
          $appName = "sfd_tool_${{ matrix.artifact_name }}"
          @"
          [Setup]
          AppName=sfd_tool (${{ matrix.artifact_name }})
          AppVersion=$tag
          DefaultDirName={autopf}\$appName
          DefaultGroupName=sfd_tool
          UninstallDisplayIcon={app}\sfd_tool.exe
          Compression=lzma2
          SolidCompression=yes
          OutputDir=./setup
          OutputBaseFilename=sfd_tool_$tag_$arch
          ChangesEnvironment=yes
          LanguageDetectionMethod=locale
          ShowLanguageDialog=yes
      
          [Languages]
          Name: "en"; MessagesFile: "compiler:Default.isl"
          Name: "zh"; MessagesFile: "./ChineseSimplified.isl"
      
          [CustomMessages]
          en.AddToPath=Add sfd_tool to system PATH (run from command line)
          zh.AddToPath=将 sfd_tool 添加到系统 PATH（可在命令行中直接运行）
      
          [Tasks]
          Name: "addtopath"; Description: "{cm:AddToPath}"; GroupDescription: "{cm:AdditionalIcons}"; Flags: checkedonce
      
          [Files]
          Source: "./app/*"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs
      
          [Icons]
          Name: "{group}\sfd_tool"; Filename: "{app}\sfd_tool.exe"
          Name: "{group}\Uninstall"; Filename: "{uninstallexe}"
          Name: "{commondesktop}\sfd_tool"; Filename: "{app}\sfd_tool.exe"
      
          [Registry]
          Root: HKLM; Subkey: "SYSTEM\CurrentControlSet\Control\Session Manager\Environment"; \
              ValueType: expandsz; ValueName: "Path"; ValueData: "{olddata};{app}"; \
              Check: NeedsAddPath(ExpandConstant('{app}')); Tasks: addtopath
      
          [Code]
          function NeedsAddPath(Param: string): boolean;
          var
            OrigPath: string;
          begin
            if not RegQueryStringValue(HKLM, 'SYSTEM\CurrentControlSet\Control\Session Manager\Environment', 'Path', OrigPath)
            then begin
              Result := True;
              exit;
            end;
            Result := Pos(';' + Param + ';', ';' + OrigPath + ';') = 0;
          end;
      
          procedure CurUninstallStepChanged(CurUninstallStep: TUninstallStep);
          var
            OrigPath: string;
            NewPath: string;
            AppDir: string;
          begin
            if CurUninstallStep = usUninstall then
            begin
              AppDir := ExpandConstant('{app}');
              if RegQueryStringValue(HKLM, 'SYSTEM\CurrentControlSet\Control\Session Manager\Environment', 'Path', OrigPath) then
              begin
                NewPath := OrigPath;
                StringChange(NewPath, AppDir + ';', '');
                StringChange(NewPath, ';' + AppDir, '');
                StringChange(NewPath, AppDir, '');
                if NewPath <> OrigPath then
                begin
                  RegWriteExpandStringValue(HKLM, 'SYSTEM\CurrentControlSet\Control\Session Manager\Environment', 'Path', NewPath);
                end;
              end;
            end;
          end;
          "@ | Out-File -FilePath ./installer.iss -Encoding UTF8

      - name: Install Chinese Language File for Inno Setup
        shell: pwsh
        run: |
          $outputPath = "./ChineseSimplified.isl"
          $islUrl = "https://raw.githubusercontent.com/C-Hidery/Inno-Setup-Chinese-Simplified-Translation/refs/heads/main/ChineseSimplified.isl"
          Write-Host "Downloading Chinese language file..."
          $content = Invoke-WebRequest -Uri $islUrl -UseBasicParsing | Select-Object -ExpandProperty Content
          $Utf8BomEncoding = New-Object System.Text.UTF8Encoding $true
          [System.IO.File]::WriteAllText($outputPath, $content, $Utf8BomEncoding)
          Write-Host "Chinese language file created at: $outputPath"

      - name: Package with Inno Setup
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
        with:
          path: ./installer.iss
          options: /O+

      - name: Upload Setup Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sfd_tool_setup_${{ matrix.artifact_name }}
          path: ./setup/*.exe
  # ==================== Release Job ====================
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: [build-windows, build-macos, build-linux-deb, build-linux-rpm, package-windows]  # 添加 package-windows
    steps:
      - name: Set Release Tag
        run: echo "RELEASE_TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
  
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          path: master
  
      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          path: output
          pattern: sfd_tool_*_Release
          merge-multiple: false
  
      - name: Download Windows Setup Artifacts  # 新增：下载安装程序
        uses: actions/download-artifact@v4
        with:
          path: output
          pattern: sfd_tool_setup_*
          merge-multiple: false
  
      - name: Download macOS DMG Artifact
        uses: actions/download-artifact@v4
        with:
          path: output
          pattern: sfd_tool_macos_dmg
          merge-multiple: false
  
      - name: Download Linux Artifacts
        uses: actions/download-artifact@v4
        with:
          path: output
          pattern: sfd_tool_linux_*
          merge-multiple: false
  
      - name: Download Linux RPM Artifacts
        uses: actions/download-artifact@v4
        with:
          path: output
          pattern: sfd_tool_rpm_package
          merge-multiple: false
  
      - name: Prepare Release Files
        run: |
          cd output
          TAG="${{ env.RELEASE_TAG }}"
  
          # 重命名 Windows 绿色版目录
          if [ -d "sfd_tool_LibUSB_Release" ]; then
            mv sfd_tool_LibUSB_Release sfd_tool_windows_x64_libusb
          fi
  
          if [ -d "sfd_tool_SPRD_Release" ]; then
            mv sfd_tool_SPRD_Release sfd_tool_windows_x86_sprd
          fi
  
          # 复制文档
          cp ../master/*.md . 2>/dev/null || true
  
          # 复制 Linux 包
          cp -r sfd_tool_linux_deb/*.deb . 2>/dev/null || true
          cp -r sfd_tool_rpm_package/*/*.rpm . 2>/dev/null || true
  
          # 复制 macOS DMG
          for dmg in sfd_tool_macos_dmg/*.dmg; do
            [ -f "$dmg" ] || continue
            cp "$dmg" "sfd_tool_macos_${TAG}.dmg"
          done
  
          # ===== 处理 Windows 安装程序 =====
          # 重命名 Setup 文件：sfd_tool_标签_架构.exe
          for setup_dir in sfd_tool_setup_*; do
            if [ -d "$setup_dir" ] && [ -f "$setup_dir"/*.exe ]; then
              # 从目录名提取架构标识
              case "$setup_dir" in
                *LibUSB*) arch="x64" ;;
                *SPRD*) arch="x86" ;;
                *) arch="unknown" ;;
              esac
              # 重命名并移动到根目录
              mv "$setup_dir"/*.exe "sfd_tool_${TAG}_${arch}.exe"
            fi
          done

          cp ./sfd_tool_Bridge_Release/Bridge.exe ./sfd_tool_windows_x86_sprd/
  
          # 创建 Windows ZIP 包（绿色版）
          if [ -d "sfd_tool_windows_x86_sprd" ]; then
            zip -r sfd_tool_windows_x86_sprd_${TAG}.zip sfd_tool_windows_x86_sprd
          fi
  
          if [ -d "sfd_tool_windows_x64_libusb" ]; then
            zip -r sfd_tool_windows_x64_libusb_${TAG}.zip sfd_tool_windows_x64_libusb
          fi
  
          # 创建完整包
          mkdir -p all_in_one
          cp ARCHITECTURE.md all_in_one/ 2>/dev/null || true
          cp README*.md all_in_one/ 2>/dev/null || true
          cp *.deb all_in_one/ 2>/dev/null || true
          cp *.rpm all_in_one/ 2>/dev/null || true
          cp sfd_tool_macos_${TAG}.dmg all_in_one/ 2>/dev/null || true
          cp sfd_tool_windows_x86_sprd_${TAG}.zip all_in_one/ 2>/dev/null || true
          cp sfd_tool_windows_x64_libusb_${TAG}.zip all_in_one/ 2>/dev/null || true
          cp sfd_tool_${TAG}_*.exe all_in_one/ 2>/dev/null || true
  
          cd all_in_one
          zip -r ../../sfd_tool_all_${TAG}.zip .
          cd ..
  
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          name: sfd_tool ${{ env.RELEASE_TAG }}
          draft: false
          prerelease: false
          body: |
            ## sfd_tool Release ${{ env.RELEASE_TAG }}
            
            ### Windows 安装程序:
            - **sfd_tool_${{ env.RELEASE_TAG }}_x64.exe**: Windows x64 版本，使用 libusb 驱动
            - **sfd_tool_${{ env.RELEASE_TAG }}_x86.exe**: Windows x86 版本，使用 SPRD 原生驱动
  
            ### Windows 绿色版 (ZIP):
            - **sfd_tool_windows_x86_sprd_${{ env.RELEASE_TAG }}.zip**: x86 绿色版，SPRD 驱动
            - **sfd_tool_windows_x64_libusb_${{ env.RELEASE_TAG }}.zip**: x64 绿色版，libusb 驱动
  
            ### 其他平台:
            - **sfd_tool_macos_${{ env.RELEASE_TAG }}.dmg**: macOS 版本
            - **Linux DEB 包**: Ubuntu/Debian 系统
            - **Linux RPM 包**: Fedora/RPM-Based 系统
  
            ### 使用说明:
            1. **Windows x86 (SPRD)**: 使用 SPRD 驱动
            2. **Windows x64 (libusb)**: 需要安装 libusb 驱动（可使用 Zadig 工具）
          files: |
            sfd_tool_all_${{ env.RELEASE_TAG }}.zip
            output/sfd_tool_windows_x86_sprd_${{ env.RELEASE_TAG }}.zip
            output/sfd_tool_windows_x64_libusb_${{ env.RELEASE_TAG }}.zip
            output/sfd_tool_${{ env.RELEASE_TAG }}_x64.exe
            output/sfd_tool_${{ env.RELEASE_TAG }}_x86.exe
            output/*.dmg
            output/*.deb
            output/*.rpm