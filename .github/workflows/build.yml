name: Build sfd_tool

on:
  workflow_dispatch:
  push:
    branches:
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 50
    env:
      VCPKG_ROOT: C:\vcpkg
    strategy:
      matrix:
        include:
          # x64 架构：vcpkg + MSVC
          - arch: x64
            config: Release
            platform: x64
            use_libusb: ON
            vcpkg_triplet: x64-windows
            build_system: vcpkg
            artifact_suffix: LibUSB
            vcpkg_packages: "gtk gettext libusb"
          
          # x86 架构：MSYS2 MINGW32 + 清华源
          - arch: x86
            config: Release
            platform: Win32
            use_libusb: OFF
            build_system: mingw32
            artifact_suffix: SPRD

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ==================== x64: MSVC 设置 ====================
      - name: Setup MSVC (x64)
        if: matrix.build_system == 'vcpkg'
        uses: TheMrMilchmann/setup-msvc-dev@v3
        with:
          arch: ${{ matrix.arch }}

      # ==================== x64: vcpkg 构建 ====================
      - name: Cache vcpkg (x64)
        if: matrix.build_system == 'vcpkg'
        uses: actions/cache@v4
        with:
          path: |
            C:\vcpkg\installed
            C:\vcpkg\packages
            C:\vcpkg\downloads
          key: vcpkg-${{ runner.os }}-${{ matrix.vcpkg_triplet }}-v13
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ matrix.vcpkg_triplet }}-

      - name: Install dependencies via vcpkg (x64)
        if: matrix.build_system == 'vcpkg'
        shell: pwsh
        run: |
          $vcpkgExe = "C:\vcpkg\vcpkg.exe"
          $packages = "${{ matrix.vcpkg_packages }}".Split(' ')
          foreach ($pkg in $packages) {
            Write-Host "Installing $pkg:${{ matrix.vcpkg_triplet }}..."
            & $vcpkgExe install "$pkg`:${{ matrix.vcpkg_triplet }}" --recurse
            if ($LASTEXITCODE -ne 0) {
              Write-Error "Failed to install $pkg"
              exit $LASTEXITCODE
            }
          }

      # ==================== x86: 配置 MINGW32 清华源 ====================
      - name: Setup MINGW32 with Tsinghua Mirror
        if: matrix.build_system == 'mingw32'
        run: |
          $msysPath = "C:\msys64"
        
          # 配置清华源 - 指向 mingw 仓库根目录
          $mirrorFile = "$msysPath\etc\pacman.d\mirrorlist.mingw32"
          $mirrorContent = @"
          ## 32-bit Mingw-w64 repository (Tsinghua University Mirror)
          Server = https://mirrors.tuna.tsinghua.edu.cn/msys2/mingw
          "@
        
          $mirrorContent | Out-File -FilePath $mirrorFile -Encoding utf8 -Force
        
          # 强制刷新包数据库
          Write-Host "Force refreshing package database..."
          & "$msysPath\usr\bin\bash.exe" -lc "pacman -Syy --noconfirm"
        
          # 验证 GTK3 包是否存在
          Write-Host "Verifying GTK3 package availability..."
          & "$msysPath\usr\bin\bash.exe" -lc "pacman -Ss mingw-w64-i686-gtk3 | head -3"
        
          # 安装 32-bit 工具链和 GTK3
          Write-Host "Installing MINGW32 toolchain and GTK3..."
          & "$msysPath\usr\bin\bash.exe" -lc "pacman -S --noconfirm --needed mingw-w64-i686-gcc mingw-w64-i686-cmake mingw-w64-i686-ninja mingw-w64-i686-gtk3 mingw-w64-i686-gettext mingw-w64-i686-pkg-config"
        
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Failed to install MINGW32 packages"
            exit $LASTEXITCODE
          }
        
          Write-Host "MINGW32 packages installed successfully"
          & "$msysPath\usr\bin\bash.exe" -lc "pacman -Q | grep mingw-w64-i686-gtk3"

      - name: Build with MINGW32 (x86)
        if: matrix.build_system == 'mingw32'
        shell: msys2 {0}
        env:
          MSYSTEM: MINGW32
        run: |
          echo "=== Building with MINGW32 (32-bit) ==="
          
          mkdir -p build_mingw32
          cd build_mingw32
          
          echo "Configuring CMake..."
          cmake .. \
            -G "Ninja" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/mingw32 \
            -DUSE_GTK=ON \
            -DUSE_LIBUSB=OFF \
            -DSFD_ENABLE_TESTS=ON
          
          if [ $? -ne 0 ]; then
            echo "CMake configuration failed"
            exit 1
          fi
          
          echo "Building..."
          ninja
          
          if [ $? -ne 0 ]; then
            echo "Build failed"
            exit 1
          fi
          
          echo "Running tests..."
          ctest --output-on-failure || true
          
          mkdir -p ../build/x86/Release
          
          echo "Copying executable..."
          cp sfd_tool.exe ../build/x86/Release/
          
          echo "Copying DLLs from /mingw32/bin..."
          if [ -d "/mingw32/bin" ]; then
            cp /mingw32/bin/*.dll ../build/x86/Release/ 2>/dev/null || true
            echo "DLL count: $(ls /mingw32/bin/*.dll 2>/dev/null | wc -l)"
          fi
          
          echo "Copying GTK runtime data..."
          if [ -d "/mingw32/share" ]; then
            cp -r /mingw32/share ../build/x86/Release/ 2>/dev/null || true
          fi
          
          echo "Build completed successfully"
          ls -la ../build/x86/Release/ | head -20

      - name: Copy SPRD Driver Files (x86)
        if: matrix.build_system == 'mingw32'
        run: |
          $destDir = "./build/x86/Release/"
          Write-Host "Copying SPRD driver files..."
          if (Test-Path "third_party/Lib/Channel9.dll") {
            Copy-Item "third_party/Lib/Channel9.dll" -Destination $destDir -Force
            Write-Host "Copied Channel9.dll"
          }
          if (Test-Path "third_party/Lib/Channel.ini") {
            Copy-Item "third_party/Lib/Channel.ini" -Destination $destDir -Force
            Write-Host "Copied Channel.ini"
          }

      # ==================== x64: 构建步骤 ====================
      - name: Create Build Directory (x64)
        if: matrix.build_system == 'vcpkg'
        run: New-Item -ItemType Directory -Force -Path ./build/${{ matrix.arch }}/${{ matrix.config }}/ | Out-Null

      - name: Configure CMake (x64)
        if: matrix.build_system == 'vcpkg'
        shell: pwsh
        run: |
          $env:Path = "C:\msys64\usr\bin;" + $env:Path
          
          cmake -S . -B build_cmake `
            -G "Visual Studio 17 2022" `
            -A ${{ matrix.platform }} `
            -DCMAKE_TOOLCHAIN_FILE="C:/vcpkg/scripts/buildsystems/vcpkg.cmake" `
            -DUSE_GTK=ON `
            -DUSE_LIBUSB=${{ matrix.use_libusb }} `
            -DSFD_ENABLE_TESTS=ON

      - name: Build and Test (x64)
        if: matrix.build_system == 'vcpkg'
        shell: pwsh
        run: |
          $env:Path = "C:\msys64\mingw64\bin;C:\vcpkg\installed\${{ matrix.vcpkg_triplet }}\bin;" + $env:Path
          
          cmake --build build_cmake --config ${{ matrix.config }} -- /m
          ctest --test-dir build_cmake -C ${{ matrix.config }} --output-on-failure
          
          Copy-Item "build_cmake/${{ matrix.config }}/sfd_tool.exe" "./build/${{ matrix.arch }}/${{ matrix.config }}/" -Force

      - name: Copy DLLs (x64)
        if: matrix.build_system == 'vcpkg'
        run: |
          $destDir = "./build/${{ matrix.arch }}/${{ matrix.config }}/"
          $vcpkgBin = "C:\vcpkg\installed\${{ matrix.vcpkg_triplet }}\bin"
          $gtkBin = "C:\msys64\mingw64\bin"
          
          if (Test-Path $vcpkgBin) {
            Copy-Item "$vcpkgBin\*.dll" $destDir -Force
            Write-Host "Copied vcpkg DLLs"
          }
          if (Test-Path $gtkBin) {
            Copy-Item "$gtkBin\*.dll" $destDir -Force
            Write-Host "Copied GTK3 DLLs"
          }

      - name: Copy GTK Runtime Data Files (x64)
        if: matrix.build_system == 'vcpkg'
        run: |
          $destDir = "./build/${{ matrix.arch }}/${{ matrix.config }}/"
          $msysPrefix = "C:\msys64\mingw64"
          
          $iconsSrc = "$msysPrefix\share\icons"
          if (Test-Path $iconsSrc) {
            $iconsDest = "$destDir\share\icons"
            New-Item -ItemType Directory -Force -Path $iconsDest | Out-Null
            Copy-Item -Path "$iconsSrc\hicolor" -Destination $iconsDest -Recurse -Force -ErrorAction SilentlyContinue
            Write-Host "Copied icons"
          }
          
          $schemasSrc = "$msysPrefix\share\glib-2.0\schemas"
          if (Test-Path $schemasSrc) {
            $schemasDest = "$destDir\share\glib-2.0\schemas"
            New-Item -ItemType Directory -Force -Path $schemasDest | Out-Null
            Copy-Item -Path "$schemasSrc\*" -Destination $schemasDest -Recurse -Force
            Write-Host "Copied GSettings schemas"
          }

      - name: Cleanup Build Directory (x64)
        if: matrix.build_system == 'vcpkg'
        run: |
          $destDir = "./build/${{ matrix.arch }}/${{ matrix.config }}/"
          Get-ChildItem -Path $destDir -Filter "*.a" | Remove-Item -Force -ErrorAction SilentlyContinue
          Get-ChildItem -Path $destDir -Filter "*.la" | Remove-Item -Force -ErrorAction SilentlyContinue
          Get-ChildItem -Path $destDir -Filter "*.exp" | Remove-Item -Force -ErrorAction SilentlyContinue

      - name: Cleanup Build Directory (x86)
        if: matrix.build_system == 'mingw32'
        run: |
          $destDir = "./build/x86/Release/"
          Get-ChildItem -Path $destDir -Filter "*.a" | Remove-Item -Force -ErrorAction SilentlyContinue
          Get-ChildItem -Path $destDir -Filter "*.la" | Remove-Item -Force -ErrorAction SilentlyContinue
          Get-ChildItem -Path $destDir -Filter "*.exp" | Remove-Item -Force -ErrorAction SilentlyContinue

      - name: Upload Build Artifacts (x64)
        if: matrix.build_system == 'vcpkg'
        uses: actions/upload-artifact@v4
        with:
          name: sfd_tool_windows_${{ matrix.artifact_suffix }}_${{ matrix.config }}
          path: ./build/${{ matrix.arch }}/${{ matrix.config }}/

      - name: Upload Build Artifacts (x86)
        if: matrix.build_system == 'mingw32'
        uses: actions/upload-artifact@v4
        with:
          name: sfd_tool_windows_SPRD_Release
          path: ./build/x86/Release/

  # ==================== macOS 构建 ====================
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 30
    env:
      MACOSX_DEPLOYMENT_TARGET: '11.0'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install macOS Build Dependencies
        run: |
          brew update
          for pkg in gtk+3 libusb gettext cmake ninja; do
            if ! brew list "$pkg" >/dev/null 2>&1; then
              brew install "$pkg"
            fi
          done

      - name: Configure CMake
        run: |
          mkdir -p build
          cmake -S . -B build \
            -G "Ninja" \
            -DCMAKE_BUILD_TYPE=Release \
            -DUSE_GTK=ON \
            -DUSE_LIBUSB=ON \
            -DSFD_ENABLE_TESTS=ON \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0

      - name: Build and Test
        run: |
          cmake --build build --config Release -- -j$(sysctl -n hw.logicalcpu)
          ctest --test-dir build -C Release --output-on-failure

      - name: Build self-contained macOS app & DMG
        run: |
          chmod +x scripts/release.sh scripts/build_macos_app.sh 2>/dev/null || true
          ./scripts/release.sh 2>/dev/null || true
          ./scripts/build_macos_app.sh 2>/dev/null || true

      - name: Upload macOS DMG Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sfd_tool_macos_dmg
          path: dist/*.dmg

  # ==================== Linux DEB 构建 ====================
  build-linux-deb:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Linux Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential debhelper devscripts \
            libgtk-3-dev libusb-1.0-0-dev pkg-config g++ \
            imagemagick desktop-file-utils cmake

      - name: Build Linux Package
        run: |
          export DEBFULLNAME="RyanCrepa"
          export DEBEMAIL="Ryan110413@outlook.com"
          chmod +x packaging/build-deb.sh
          ./packaging/build-deb.sh

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sfd_tool_linux_deb
          path: |
            /tmp/build-sfd-tool/*.deb
            /tmp/build-sfd-tool/*.rpm

  # ==================== Linux RPM 构建 ====================
  build-linux-rpm:
    runs-on: ubuntu-latest
    container:
      image: fedora:latest
    timeout-minutes: 20
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install RPM Build Dependencies
        run: |
          dnf update -y
          dnf install -y rpm-build gcc-c++ gtk3-devel libusb1-devel libusb1 \
            pkgconf-pkg-config make ImageMagick desktop-file-utils \
            gtk-update-icon-cache which cmake ninja-build

      - name: Build RPM
        run: |
          chmod +x packaging/build-rpm.sh
          ./packaging/build-rpm.sh
          
      - name: Upload RPM Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sfd_tool_rpm_package
          path: |
            ~/rpmbuild/RPMS/*/*.rpm

  # ==================== Release Job ====================
  release:
    if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: [build-windows, build-macos, build-linux-deb, build-linux-rpm]
    steps:
      - name: Set Release Tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "RELEASE_TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV
          else
            echo "RELEASE_TAG=sfd_tool_master_$(TZ='Asia/Shanghai' date +'%Y%m%d_%H%M')" >> $GITHUB_ENV
          fi

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          path: master

      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          path: output
          pattern: sfd_tool_windows_*_Release
          merge-multiple: false

      - name: Download macOS DMG Artifact
        uses: actions/download-artifact@v4
        with:
          path: output
          pattern: sfd_tool_macos_dmg
          merge-multiple: false

      - name: Download Linux Artifacts
        uses: actions/download-artifact@v4
        with:
          path: output
          pattern: sfd_tool_linux_*
          merge-multiple: false

      - name: Prepare Release Files
        run: |
          cd output
          
          # 重命名 Windows 目录
          if [ -d "sfd_tool_windows_LibUSB_Release" ]; then
            mv sfd_tool_windows_LibUSB_Release sfd_tool_windows_x64_libusb
            cp ../master/docs/VERSION_LOG.md sfd_tool_windows_x64_libusb/ 2>/dev/null || true
          fi
          
          if [ -d "sfd_tool_windows_SPRD_Release" ]; then
            mv sfd_tool_windows_SPRD_Release sfd_tool_windows_x86_sprd
            cp ../master/docs/VERSION_LOG.md sfd_tool_windows_x86_sprd/ 2>/dev/null || true
            cp ../master/third_party/Lib/Channel9.dll sfd_tool_windows_x86_sprd/ 2>/dev/null || true
            cp ../master/third_party/Lib/Channel.ini sfd_tool_windows_x86_sprd/ 2>/dev/null || true
          fi
          
          # 复制文档
          cp ../master/*.md . 2>/dev/null || true
          
          # 复制 Linux 包
          cp -r sfd_tool_linux_deb/*.deb . 2>/dev/null || true
          cp -r sfd_tool_rpm_package/*/*.rpm . 2>/dev/null || true
          
          # 复制 macOS DMG
          for dmg in sfd_tool_macos_dmg/*.dmg; do
            [ -f "$dmg" ] || continue
            cp "$dmg" "sfd_tool_macos_${{ env.RELEASE_TAG }}.dmg"
          done
          
          # 创建 Windows ZIP 包
          if [ -d "sfd_tool_windows_x86_sprd" ]; then
            zip -r sfd_tool_windows_x86_sprd_${{ env.RELEASE_TAG }}.zip sfd_tool_windows_x86_sprd
          fi
          
          if [ -d "sfd_tool_windows_x64_libusb" ]; then
            zip -r sfd_tool_windows_x64_libusb_${{ env.RELEASE_TAG }}.zip sfd_tool_windows_x64_libusb
          fi
          
          # 创建完整包
          zip -r ../sfd_tool_all_${{ env.RELEASE_TAG }}.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          name: sfd_tool ${{ env.RELEASE_TAG }}
          draft: false
          prerelease: false
          body: |
            ## sfd_tool Release ${{ env.RELEASE_TAG }}
            
            ### Windows 版本:
            - **sfd_tool_windows_x86_sprd**: Windows x86 版本，使用 SPRD 原生驱动（兼容性最好）
            - **sfd_tool_windows_x64_libusb**: Windows x64 版本，使用 libusb 驱动（支持热插拔）
            
            ### 其他平台:
            - **sfd_tool_macos**: macOS 版本（DMG 包）
            - **Linux DEB 包**: Ubuntu/Debian 系统安装包
            - **Linux RPM 包**: Fedora/RPM-Based 系统安装包
            
            ### 使用说明:
            1. **Windows x86 (SPRD 版)**: 直接运行，使用系统自带的 SPRD 驱动
            2. **Windows x64 (libusb 版)**: 需要安装 libusb 驱动（可使用 Zadig 工具）
            3. **macOS**: 需要安装 GTK3 运行时（`brew install gtk+3`）
            4. **Linux**: 安装对应的 .deb 或 .rpm 包即可
          files: |
            sfd_tool_all_${{ env.RELEASE_TAG }}.zip
            output/sfd_tool_windows_x86_sprd_${{ env.RELEASE_TAG }}.zip
            output/sfd_tool_windows_x64_libusb_${{ env.RELEASE_TAG }}.zip
            output/*.dmg
            output/*.deb
            output/*.rpm