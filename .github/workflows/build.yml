name: Build sfd_tool

on:
  workflow_dispatch:
  push:
    branches:
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      VCPKG_ROOT: C:\vcpkg
    strategy:
      matrix:
        include:
          # x64 架构：使用 vcpkg + MSVC
          - arch: x64
            config: Release
            cmake_platform: x64
            use_libusb: ON
            vcpkg_triplet: x64-windows
            # x64 使用 vcpkg 构建
            build_system: vcpkg
            artifact_suffix: x64_LibUSB
          
          # x86 架构：使用 MSYS2 + MinGW
          - arch: x86
            config: Release
            cmake_platform: Win32
            use_libusb: OFF
            # x86 使用 MSYS2 MinGW 构建
            build_system: msys2
            msys_arch: mingw32
            msys_prefix: mingw32
            artifact_suffix: x86

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ==================== x64 专用步骤 ====================
      - name: Setup MSVS (x64)
        if: matrix.build_system == 'vcpkg'
        uses: TheMrMilchmann/setup-msvc-dev@v3
        with:
          arch: ${{ matrix.arch }}

      - name: Cache vcpkg (x64)
        if: matrix.build_system == 'vcpkg'
        uses: actions/cache@v4
        with:
          path: |
            C:\vcpkg\installed
            C:\vcpkg\packages
            C:\vcpkg\downloads
          key: vcpkg-${{ runner.os }}-${{ matrix.vcpkg_triplet }}-v1
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ matrix.vcpkg_triplet }}-

      - name: Install gettext via vcpkg (x64)
        if: matrix.build_system == 'vcpkg'
        shell: pwsh
        run: |
          $vcpkgExe = "C:\vcpkg\vcpkg.exe"
          if (-not (Test-Path $vcpkgExe)) {
            Write-Error "vcpkg.exe not found at $vcpkgExe"
            exit 1
          }
          Write-Host "Installing gettext for x64..."
          & $vcpkgExe install "gettext:${{ matrix.vcpkg_triplet }}"

      # ==================== x86 专用步骤 ====================
      
    
      - name: Install MSYS2 Packages (x86)
        if: matrix.build_system == 'msys2'
        run: |
          # GitHub Actions Windows 镜像已预装 MSYS2
          $msysPath = "C:\msys32"
          
          Write-Host "安装 GTK3 开发包..."
          
          # 更新 MSYS2
          & "$msysPath\usr\bin\bash.exe" -lc "pacman -Syu --noconfirm"
          
          # 根据架构安装对应的 GTK3
          if ("${{ matrix.arch }}" -eq "x64") {
            Write-Host "安装 x64 GTK3 完整开发包..."
            & "$msysPath\usr\bin\bash.exe" -lc "pacman -S --noconfirm mingw-w64-x86_64-gtk3 mingw-w64-x86_64-harfbuzz mingw-w64-x86_64-pango mingw-w64-x86_64-cairo mingw-w64-x86_64-glib2"
          } else {
            Write-Host "安装 x86 GTK3 完整开发包..."
            & "$msysPath\usr\bin\bash.exe" -lc "pacman -S --noconfirm mingw-w64-i686-gtk3 mingw-w64-i686-harfbuzz mingw-w64-i686-pango mingw-w64-i686-cairo mingw-w64-i686-glib2"
          }
      - name: Build with MSYS2 MinGW (x86)
        if: matrix.build_system == 'msys2'
        shell: msys2 {0}
        run: |
          # 创建构建目录
          mkdir -p build_msys2
          cd build_msys2
          
          # 配置 CMake（使用 MinGW 工具链）
          cmake .. \
            -G "Ninja" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX=/usr/local \
            -DUSE_GTK=ON \
            -DUSE_LIBUSB=OFF \
            -DSFD_ENABLE_TESTS=ON \
            -DCMAKE_PREFIX_PATH="/mingw32"
          
          # 编译
          ninja
          
          # 运行测试
          ctest --output-on-failure
          
          # 创建输出目录
          mkdir -p ../build/x86/Release
          
          # 复制可执行文件
          cp sfd_tool.exe ../build/x86/Release/
          
          # 复制 DLL 依赖
          cp /mingw32/bin/*.dll ../build/x86/Release/ 2>/dev/null || true
          
          # 复制 GTK 运行时数据
          cp -r /mingw32/share ../build/x86/Release/ 2>/dev/null || true
          
          # 复制 locale 文件
          if [ -d "locale" ]; then
            cp -r locale ../build/x86/Release/ 2>/dev/null || true
          fi

      - name: Copy locale files for x86 (if built separately)
        if: matrix.build_system == 'msys2'
        shell: pwsh
        run: |
          $destDir = "./build/x86/Release/locale/zh_CN/LC_MESSAGES"
          New-Item -ItemType Directory -Force -Path $destDir | Out-Null
          $srcMo = "build_msys2/locale/zh_CN/LC_MESSAGES/sfd_tool.mo"
          if (Test-Path $srcMo) {
            Copy-Item $srcMo -Destination $destDir -Force
            Write-Host "已复制 locale 文件"
          } else {
            Write-Warning "未找到 locale 文件: $srcMo"
          }

      # ==================== x64 MSVC 构建步骤 ====================
      - name: Create Build Directory (x64)
        if: matrix.build_system == 'vcpkg'
        run: New-Item -ItemType Directory -Force -Path ./build/${{ matrix.arch }}/${{ matrix.config }}/

      - name: Configure CMake (x64)
        if: matrix.build_system == 'vcpkg'
        shell: pwsh
        run: |
          # 确保 MSYS2 的 msgfmt 可用（用于生成 .mo 文件）
          $env:Path = "C:\msys64\usr\bin;" + $env:Path
          
          cmake -S . -B build_cmake `
            -G "Visual Studio 17 2022" `
            -A ${{ matrix.cmake_platform }} `
            -DCMAKE_TOOLCHAIN_FILE="C:/vcpkg/scripts/buildsystems/vcpkg.cmake" `
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON `
            -DUSE_GTK=ON `
            -DUSE_LIBUSB=${{ matrix.use_libusb }} `
            -DSFD_ENABLE_TESTS=ON

      - name: Build and Test (x64)
        if: matrix.build_system == 'vcpkg'
        shell: pwsh
        run: |
          # 添加 GTK3 DLL 到 PATH 用于测试
          $env:Path = "C:\msys64\mingw64\bin;" + $env:Path
          $env:Path = "C:\vcpkg\installed\${{ matrix.vcpkg_triplet }}\bin;" + $env:Path
          
          cmake --build build_cmake --config ${{ matrix.config }} -- /m
          ctest --test-dir build_cmake -C ${{ matrix.config }} --output-on-failure
          
          # 复制可执行文件
          New-Item -ItemType Directory -Force -Path ./build/${{ matrix.arch }}/${{ matrix.config }}/ | Out-Null
          Copy-Item "build_cmake/${{ matrix.config }}/sfd_tool.exe" "./build/${{ matrix.arch }}/${{ matrix.config }}/" -Force

      - name: Copy GTK3 DLLs (x64)
        if: matrix.build_system == 'vcpkg'
        run: |
          $destDir = "./build/${{ matrix.arch }}/${{ matrix.config }}/"
          $gtkBinPath = "C:\msys64\mingw64\bin"
          
          Write-Host "复制 GTK3 DLLs 从: $gtkBinPath"
          if (Test-Path $gtkBinPath) {
            Get-ChildItem -Path $gtkBinPath -Filter "*.dll" | ForEach-Object {
              Copy-Item $_.FullName -Destination $destDir -Force
            }
            Write-Host "已复制 GTK3 DLLs"
          }

      - name: Copy gettext DLLs from MSYS2 (x64)
        if: matrix.build_system == 'vcpkg'
        run: |
          $destDir = "./build/${{ matrix.arch }}/${{ matrix.config }}/"
          $gettextBinPath = "C:\msys64\mingw64\bin"
          
          # 复制 gettext 相关的 DLL
          $gettextDlls = @("libintl-8.dll", "libiconv-2.dll")
          foreach ($dll in $gettextDlls) {
            $src = Join-Path $gettextBinPath $dll
            if (Test-Path $src) {
              Copy-Item $src -Destination $destDir -Force
              Write-Host "已复制 $dll"
            }
          }

      - name: Copy GTK Runtime Data Files (x64)
        if: matrix.build_system == 'vcpkg'
        run: |
          $destDir = "./build/${{ matrix.arch }}/${{ matrix.config }}/"
          $msysPrefix = "C:\msys64\mingw64"
          
          # 复制图标主题
          $iconsSrc = "$msysPrefix\share\icons"
          if (Test-Path $iconsSrc) {
            $iconsDest = "$destDir\share\icons"
            New-Item -ItemType Directory -Force -Path $iconsDest | Out-Null
            Copy-Item -Path "$iconsSrc\hicolor" -Destination $iconsDest -Recurse -Force -ErrorAction SilentlyContinue
            Copy-Item -Path "$iconsSrc\Adwaita" -Destination $iconsDest -Recurse -Force -ErrorAction SilentlyContinue
          }
          
          # 复制 GSettings schemas
          $schemasSrc = "$msysPrefix\share\glib-2.0\schemas"
          if (Test-Path $schemasSrc) {
            $schemasDest = "$destDir\share\glib-2.0\schemas"
            New-Item -ItemType Directory -Force -Path $schemasDest | Out-Null
            Copy-Item -Path "$schemasSrc\*" -Destination $schemasDest -Recurse -Force
          }

      - name: Copy locale files (x64)
        if: matrix.build_system == 'vcpkg'
        run: |
          $destDir = "./build/${{ matrix.arch }}/${{ matrix.config }}/locale/zh_CN/LC_MESSAGES"
          New-Item -ItemType Directory -Force -Path $destDir | Out-Null
          $srcMo = "build_cmake/locale/zh_CN/LC_MESSAGES/sfd_tool.mo"
          if (Test-Path $srcMo) {
            Copy-Item $srcMo -Destination $destDir -Force
            Write-Host "已复制 locale 文件"
          }

      - name: Cleanup Build Directory (x64)
        if: matrix.build_system == 'vcpkg'
        run: |
          $destDir = "./build/${{ matrix.arch }}/${{ matrix.config }}/"
          $keepFiles = @("sfd_tool.exe", "sfd_tool.pdb")
          
          Get-ChildItem -Path $destDir -Filter "*.exe" -Exclude $keepFiles | Remove-Item -Force -ErrorAction SilentlyContinue
          Get-ChildItem -Path $destDir -Filter "*.a" | Remove-Item -Force -ErrorAction SilentlyContinue
          Get-ChildItem -Path $destDir -Filter "*.la" | Remove-Item -Force -ErrorAction SilentlyContinue
          
          Write-Host "清理完成"

      # ==================== 上传产物 ====================
      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sfd_tool_${{ matrix.artifact_suffix }}_${{ matrix.config }}
          path: ./build/${{ matrix.arch == 'x86' && 'x86' || matrix.arch }}/${{ matrix.config }}/

  # ==================== macOS 和 Linux 构建保持不变 ====================
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 30
    env:
      MACOSX_DEPLOYMENT_TARGET: '11.0'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install macOS Build Dependencies
        run: |
          brew update
          for pkg in gtk+3 libusb gettext cmake ninja; do
            if ! brew list "$pkg" >/dev/null 2>&1; then
              brew install "$pkg"
            fi
          done

      - name: Configure (CMake)
        run: |
          mkdir -p build_cmake
          cmake -S . -B build_cmake \
            -G "Ninja" \
            -DCMAKE_BUILD_TYPE=Release \
            -DUSE_GTK=ON \
            -DUSE_LIBUSB=ON \
            -DSFD_ENABLE_TESTS=ON \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0

      - name: Build and Test (CMake)
        run: |
          cmake --build build_cmake --config Release -- -j$(sysctl -n hw.logicalcpu)
          ctest --test-dir build_cmake -C Release --output-on-failure

      - name: Build self-contained macOS app & DMG
        run: |
          chmod +x scripts/release.sh scripts/build_macos_app.sh
          ./scripts/release.sh
          ./scripts/build_macos_app.sh

      - name: Upload macOS DMG Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sfd_tool_macos_dmg
          path: dist/sfd_tool_macos.dmg

  build-linux-deb:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Linux Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential debhelper devscripts \
            libgtk-3-dev libusb-1.0-0-dev pkg-config g++ \
            imagemagick desktop-file-utils cmake

      - name: Make build-deb.sh executable
        run: chmod +x packaging/build-deb.sh

      - name: Build Linux Package
        run: |
          export DEBFULLNAME="RyanCrepa"
          export DEBEMAIL="Ryan110413@outlook.com"
          ./packaging/build-deb.sh

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sfd_tool_linux_deb
          path: |
            /tmp/build-sfd-tool/*.deb
            /tmp/build-sfd-tool/*.rpm
            /tmp/build-sfd-tool/*.changes
            /tmp/build-sfd-tool/*.buildinfo
            /tmp/build-sfd-tool/*.dsc

  build-linux-rpm:
    runs-on: ubuntu-latest
    container:
      image: fedora:latest
    timeout-minutes: 20
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install RPM Build Dependencies
        run: |
          dnf update -y
          dnf install -y rpm-build gcc-c++ gtk3-devel libusb1-devel libusb1\
            pkgconf-pkg-config make ImageMagick desktop-file-utils \
            gtk-update-icon-cache which cmake ninja-build

      - name: Build Rpm
        run: |
          chmod +x packaging/build-rpm.sh
          ./packaging/build-rpm.sh
          
      - name: Upload RPM Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sfd_tool_rpm_package
          path: |
            ~/rpmbuild/RPMS/*/*.rpm

  # ==================== Release Job ====================
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: [build-windows, build-macos, build-linux-deb, build-linux-rpm]
    steps:
      - name: Set Release Tag
        run: echo "RELEASE_TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          path: master

      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          path: output
          pattern: sfd_tool_*_Release
          merge-multiple: false

      - name: Download macOS DMG Artifact
        uses: actions/download-artifact@v4
        with:
          path: output
          pattern: sfd_tool_macos_dmg

      - name: Download Deb Linux Artifact
        uses: actions/download-artifact@v4
        with:
          path: output
          pattern: sfd_tool_linux_deb
          
      - name: Download Rpm Linux Package
        uses: actions/download-artifact@v4
        with:
          path: output
          pattern: sfd_tool_rpm_package
          
      - name: Prepare Release Files
        run: |
          cd output
          
          # 重命名 Windows x64 版本目录
          if [ -d "sfd_tool_x64_LibUSB_Release" ]; then
            mv sfd_tool_x64_LibUSB_Release sfd_tool_windows_x64_libusb
            # 复制 libusb DLL 和文档
            cp ../master/third_party/Lib/libusb-1.0.dll sfd_tool_windows_x64_libusb/ || true
            cp ../master/docs/VERSION_LOG.md sfd_tool_windows_x64_libusb/ || true
          fi
          
          # 重命名 Windows x86 版本目录
          if [ -d "sfd_tool_x86_Release" ]; then
            mv sfd_tool_x86_Release sfd_tool_windows_x86
            cp ../master/docs/VERSION_LOG.md sfd_tool_windows_x86/ || true
          fi
          
          # 复制 Linux 包
          cp -r sfd_tool_linux_deb/*.deb . || true
          cp -r sfd_tool_rpm_package/*/*.rpm . || true
          
          # 复制 macOS DMG（并带上版本号）
          for dmg in sfd_tool_macos_dmg/*.dmg; do
            [ -f "$dmg" ] || continue
            cp "$dmg" "sfd_tool_macos_${{ env.RELEASE_TAG }}.dmg"
          done
          
          # 创建 Windows x64 版本 ZIP
          if [ -d "sfd_tool_windows_x64_libusb" ]; then
            zip -r sfd_tool_windows_x64_libusb_${{ env.RELEASE_TAG }}.zip sfd_tool_windows_x64_libusb
          fi
          
          # 创建 Windows x86 版本 ZIP
          if [ -d "sfd_tool_windows_x86" ]; then
            zip -r sfd_tool_windows_x86_${{ env.RELEASE_TAG }}.zip sfd_tool_windows_x86
          fi
          
          # 创建包含所有平台构建产物的总包
          zip -r sfd_tool_all_${{ env.RELEASE_TAG }}.zip .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          name: sfd_tool ${{ env.RELEASE_TAG }}
          draft: false
          prerelease: false
          body: |
            ## sfd_tool Release ${{ env.RELEASE_TAG }}
            
            ### Windows 版本:
            - **sfd_tool_windows_x64_libusb**: Windows x64 版本，使用 libusb 驱动（支持 USB 设备）
            - **sfd_tool_windows_x86**: Windows x86 版本，使用内置驱动
            
            ### 其他平台:
            - **sfd_tool_macos**: macOS 版本（DMG 包）
            - **Linux DEB 包**: Ubuntu/Debian 系统安装包
            - **Linux RPM 包**: Fedora/RPM-Based 系统安装包
            
            ### 使用说明:
            1. Windows x64 (libusb 版): 需要安装 libusb 驱动（可使用 Zadig 工具）
            2. Windows x86: 直接运行即可，无需额外驱动
            3. macOS: 需要安装 GTK3 运行时（`brew install gtk+3`）
            
            ### 文件列表:
            - sfd_tool_windows_x64_libusb_${{ env.RELEASE_TAG }}.zip
            - sfd_tool_windows_x86_${{ env.RELEASE_TAG }}.zip
            - sfd_tool_macos_${{ env.RELEASE_TAG }}.dmg
            - *.deb / *.rpm - Linux 安装包
            - sfd_tool_all_${{ env.RELEASE_TAG }}.zip
          files: |
            output/sfd_tool_windows_x64_libusb_${{ env.RELEASE_TAG }}.zip
            output/sfd_tool_windows_x86_${{ env.RELEASE_TAG }}.zip
            output/sfd_tool_all_${{ env.RELEASE_TAG }}.zip
            output/*.deb
            output/*.rpm
            output/*.dmg