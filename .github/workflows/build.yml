name: Build sfd_tool

on:
  workflow_dispatch:
  push:
    branches:
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - master

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 40
    env:
      VCPKG_ROOT: C:\vcpkg
    strategy:
      matrix:
        include:
          # x64 架构：libusb 驱动版（vcpkg 只安装 gettext，libusb 使用项目自带）
          - arch: x64
            config: Release
            msys_gtk_arch: mingw64
            cmake_platform: x64
            use_libusb: ON
            vcpkg_triplet: x64-windows
            artifact_name: LibUSB
          
          # x86 架构：SPRD 原生驱动版（不使用 vcpkg，从 MSYS2 手动获取 GTK+gettext）
          - arch: x86
            config: Release
            msys_gtk_arch: mingw32
            cmake_platform: Win32
            use_libusb: OFF
            vcpkg_triplet: x86-windows
            artifact_name: SPRD

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup MSVS
        uses: TheMrMilchmann/setup-msvc-dev@v3
        with:
          arch: ${{ matrix.arch }}

      - name: Install gettext (libintl) via vcpkg
        shell: pwsh
        run: |
          # 优先使用 GitHub 镜像自带的经典 vcpkg 实例
          $vcpkgExe = "C:\vcpkg\vcpkg.exe"
          if (-not (Test-Path $vcpkgExe)) {
            Write-Error "vcpkg.exe not found at $vcpkgExe"
            Get-ChildItem C:\ | Select-Object -First 20
            exit 1
          }
          Write-Host "Using vcpkg: $vcpkgExe"
          # 安装 x86 / x64 的 gettext（包含 libintl）
          & $vcpkgExe install gettext:x86-windows gettext:x64-windows

      - name: Install MSYS2 and GTK3 (x64)
        if: matrix.arch == 'x64'
        shell: pwsh
        run: |
          $msysPath = "C:\msys64"
          & "$msysPath\usr\bin\bash.exe" -lc "pacman -Sy --noconfirm"
          & "$msysPath\usr\bin\bash.exe" -lc "pacman -S --noconfirm --needed mingw-w64-x86_64-gtk3 mingw-w64-x86_64-harfbuzz mingw-w64-x86_64-pango mingw-w64-x86_64-cairo mingw-w64-x86_64-glib2"

      # x86：安装 MSYS2 的 GTK3 和 gettext，并生成 MSVC 兼容的导入库
      - name: Install MSYS2 and GTK3 (x86)
        if: matrix.arch == 'x86'
        shell: pwsh
        run: |
          $msysPath = "C:\msys64"

          Write-Host "安装 GTK3 开发包..."
          & "$msysPath\usr\bin\bash.exe" -lc "pacman -Sy --noconfirm"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

          Write-Host "从清华镜像手动下载安装 GTK3 及依赖 (x86)..."
          $pkgCache = "$msysPath\var\cache\pacman\pkg"
          New-Item -ItemType Directory -Force -Path $pkgCache | Out-Null
          $mirrorBase = "https://mirrors.tuna.tsinghua.edu.cn/msys2/mingw/mingw32"
          $pkgFiles = @(
            "mingw-w64-i686-glib2-2.82.4-1-any.pkg.tar.zst",
            "mingw-w64-i686-cairo-1.18.2-2-any.pkg.tar.zst",
            "mingw-w64-i686-pango-1.56.1-1-any.pkg.tar.zst",
            "mingw-w64-i686-harfbuzz-10.1.0-1-any.pkg.tar.zst",
            "mingw-w64-i686-gdk-pixbuf2-2.42.12-1-any.pkg.tar.zst",
            "mingw-w64-i686-atk-2.52.0-1-any.pkg.tar.zst",
            "mingw-w64-i686-freetype-2.13.2-1-any.pkg.tar.zst",
            "mingw-w64-i686-fontconfig-2.15.0-2-any.pkg.tar.zst",
            "mingw-w64-i686-libpng-1.6.43-1-any.pkg.tar.zst",
            "mingw-w64-i686-libjpeg-turbo-3.0.3-1-any.pkg.tar.zst",
            "mingw-w64-i686-libtiff-4.6.0-1-any.pkg.tar.zst",
            "mingw-w64-i686-libxml2-2.12.10-1-any.pkg.tar.zst",
            "mingw-w64-i686-zlib-1.3.1-1-any.pkg.tar.zst",
            "mingw-w64-i686-adwaita-icon-theme-legacy-46.2-1-any.pkg.tar.zst",
            "mingw-w64-i686-librsvg-2.58.0-1-any.pkg.tar.zst",
            "mingw-w64-i686-adwaita-icon-theme-49.0-1-any.pkg.tar.zst",
            "mingw-w64-i686-gtk-update-icon-cache-3.24.43-1-any.pkg.tar.zst",
            "mingw-w64-i686-gtk3-3.24.48-2-any.pkg.tar.zst"
          )
          $tempDir = Join-Path $env:TEMP "msys2_pkgs"
          New-Item -ItemType Directory -Force -Path $tempDir | Out-Null
          foreach ($pkgFile in $pkgFiles) {
            $pkgUrl = "$mirrorBase/$pkgFile"
            $localFile = Join-Path $tempDir $pkgFile
            Write-Host "下载 $pkgUrl"
            Invoke-WebRequest -Uri $pkgUrl -OutFile $localFile -UseBasicParsing
          }
          Move-Item "$tempDir\*.pkg.tar.zst" $pkgCache -Force
          $pkgCacheUnix = $pkgCache -replace '\\', '/' -replace '^C:', '/c'
          & "$msysPath\usr\bin\bash.exe" -lc "pacman -U --noconfirm --overwrite='*' $pkgCacheUnix/mingw-w64-i686-*.pkg.tar.zst"
          & "$msysPath\usr\bin\bash.exe" -lc "pacman -S --noconfirm --needed mingw-w64-i686-tools"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          

      - name: Create Build Directory
        run: New-Item -ItemType Directory -Force -Path ./build/${{ matrix.artifact_name }}/${{ matrix.config }}/ | Out-Null

      - name: Configure (CMake)
        shell: pwsh
        run: |
          $env:Path = "C:\msys64\usr\bin;" + $env:Path
          $commonArgs = @(
            "-S", ".",
            "-B", "build_cmake",
            "-G", "Visual Studio 17 2022",
            "-A", "${{ matrix.cmake_platform }}",
            "-DCMAKE_EXPORT_COMPILE_COMMANDS=ON",
            "-DUSE_GTK=ON",
            "-DUSE_LIBUSB=${{ matrix.use_libusb }}",
            "-DSFD_ENABLE_TESTS=ON"
            "-DCMAKE_TOOLCHAIN_FILE=C:/vcpkg/scripts/buildsystems/vcpkg.cmake"
          )
         
          cmake @commonArgs

      - name: Build (${{ matrix.artifact_name }} - ${{ matrix.config }})
        shell: pwsh
        run: |
          $env:Path = "C:\msys64\${{ matrix.msys_gtk_arch }}\bin;" + $env:Path
          if ("${{ matrix.arch }}" -eq "x64") {
            $env:Path = "C:\vcpkg\installed\${{ matrix.vcpkg_triplet }}\bin;" + $env:Path
          }
          cmake --build build_cmake --config ${{ matrix.config }} -- /m
          ctest --test-dir build_cmake -C ${{ matrix.config }} --output-on-failure
          Copy-Item "build_cmake/${{ matrix.config }}/sfd_tool.exe" "./build/${{ matrix.artifact_name }}/${{ matrix.config }}/" -Force

      - name: Copy DLLs from GTK3 bin directory
        run: |
          $destDir = "./build/${{ matrix.artifact_name }}/${{ matrix.config }}/"
          $gtkBinPath = "C:\msys64\${{ matrix.msys_gtk_arch }}\bin"
          Get-ChildItem -Path $gtkBinPath -Filter "*.dll" | ForEach-Object {
            Copy-Item $_.FullName -Destination $destDir -Force
          }

      - name: Copy gettext runtime DLLs (x64 from vcpkg, x86 from MSYS2)
        shell: pwsh
        run: |
          $destDir = "./build/${{ matrix.artifact_name }}/${{ matrix.config }}/"
          if ("${{ matrix.arch }}" -eq "x64") {
            $vcpkgBin = "C:\vcpkg\installed\${{ matrix.vcpkg_triplet }}\bin"
            if (Test-Path $vcpkgBin) {
              Get-ChildItem $vcpkgBin -Filter "*.dll" | ForEach-Object {
                Copy-Item $_.FullName -Destination $destDir -Force
              }
            }
          } else {
            # x86 的 libintl-8.dll 已经在 GTK bin 目录中，无需额外复制
            Write-Host "x86 gettext DLL already present from GTK bin"
          }

      - name: Copy libusb DLL from project (x64 only)
        if: matrix.use_libusb == 'ON'
        run: |
          $destDir = "./build/${{ matrix.artifact_name }}/${{ matrix.config }}/"
          $libusbPath = "third_party/Lib/libusb-1.0.dll"
          if (Test-Path $libusbPath) {
            Copy-Item $libusbPath -Destination $destDir -Force
          }

      - name: Copy SPRD Driver Files (x86 only)
        if: matrix.use_libusb == 'OFF'
        run: |
          $destDir = "./build/${{ matrix.artifact_name }}/${{ matrix.config }}/"
          if (Test-Path "third_party/Lib/Channel9.dll") {
            Copy-Item "third_party/Lib/Channel9.dll" -Destination $destDir -Force
          }
          if (Test-Path "third_party/Lib/Channel.ini") {
            Copy-Item "third_party/Lib/Channel.ini" -Destination $destDir -Force
          }

      - name: Copy GTK Runtime Data Files
        run: |
          $destDir = "./build/${{ matrix.artifact_name }}/${{ matrix.config }}/"
          $msysPrefix = "C:\msys64\${{ matrix.msys_gtk_arch }}"
          $iconsSrc = "$msysPrefix\share\icons"
          if (Test-Path $iconsSrc) {
            $iconsDest = "$destDir\share\icons"
            New-Item -ItemType Directory -Force -Path $iconsDest | Out-Null
            Copy-Item -Path "$iconsSrc\hicolor" -Destination $iconsDest -Recurse -Force -ErrorAction SilentlyContinue
            Copy-Item -Path "$iconsSrc\Adwaita" -Destination $iconsDest -Recurse -Force -ErrorAction SilentlyContinue
          }
          $schemasSrc = "$msysPrefix\share\glib-2.0\schemas"
          if (Test-Path $schemasSrc) {
            $schemasDest = "$destDir\share\glib-2.0\schemas"
            New-Item -ItemType Directory -Force -Path $schemasDest | Out-Null
            Copy-Item -Path "$schemasSrc\*" -Destination $schemasDest -Recurse -Force
          }

      - name: Copy locale (.mo) files
        run: |
          $destDir = "./build/${{ matrix.artifact_name }}/${{ matrix.config }}/locale/zh_CN/LC_MESSAGES"
          New-Item -ItemType Directory -Force -Path $destDir | Out-Null
          $srcMo = "build_cmake/locale/zh_CN/LC_MESSAGES/sfd_tool.mo"
          if (Test-Path $srcMo) {
            Copy-Item $srcMo -Destination $destDir -Force
          }

      - name: Cleanup Build Directory
        run: |
          $destDir = "./build/${{ matrix.artifact_name }}/${{ matrix.config }}/"
          $unwantedExtensions = @(".a", ".la", ".def", ".sh", ".py", ".pl", ".exp")
          $keepFiles = @("sfd_tool.exe", "sfd_tool.pdb", "BMPlatform.dll", "Channel9.dll", "Channel.ini", "libusb-1.0.dll")
          foreach ($ext in $unwantedExtensions) {
            Get-ChildItem -Path $destDir -Filter "*$ext" -Exclude $keepFiles -ErrorAction SilentlyContinue | 
              Remove-Item -Force -ErrorAction SilentlyContinue
          }

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sfd_tool_${{ matrix.artifact_name }}_${{ matrix.config }}
          path: ./build/${{ matrix.artifact_name }}/${{ matrix.config }}/

  # ==================== macOS 构建（保持不变）====================
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 30
    env:
      MACOSX_DEPLOYMENT_TARGET: '11.0'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install macOS Build Dependencies
        run: |
          brew update
          for pkg in gtk+3 libusb gettext cmake ninja; do
            if ! brew list "$pkg" >/dev/null 2>&1; then
              brew install "$pkg"
            fi
          done

      - name: Configure (CMake)
        run: |
          mkdir -p build_cmake
          cmake -S . -B build_cmake \
            -G "Ninja" \
            -DCMAKE_BUILD_TYPE=Release \
            -DUSE_GTK=ON \
            -DUSE_LIBUSB=ON \
            -DSFD_ENABLE_TESTS=ON \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=11.0

      - name: Build and Test
        run: |
          cmake --build build_cmake --config Release -- -j$(sysctl -n hw.logicalcpu)
          ctest --test-dir build_cmake -C Release --output-on-failure

      - name: Build self-contained macOS app & DMG
        run: |
          chmod +x scripts/release.sh scripts/build_macos_app.sh 2>/dev/null || true
          ./scripts/release.sh 2>/dev/null || true
          ./scripts/build_macos_app.sh 2>/dev/null || true

      - name: Upload macOS DMG Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sfd_tool_macos_dmg
          path: dist/*.dmg

  # ==================== Linux DEB 构建（保持不变）====================
  build-linux-deb:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Linux Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential debhelper devscripts \
            libgtk-3-dev libusb-1.0-0-dev pkg-config g++ \
            imagemagick desktop-file-utils cmake

      - name: Build Linux Package
        run: |
          export DEBFULLNAME="RyanCrepa"
          export DEBEMAIL="Ryan110413@outlook.com"
          chmod +x packaging/build-deb.sh
          ./packaging/build-deb.sh

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sfd_tool_linux_deb
          path: |
            /tmp/build-sfd-tool/*.deb
            /tmp/build-sfd-tool/*.rpm

  # ==================== Linux RPM 构建（保持不变）====================
  build-linux-rpm:
    runs-on: ubuntu-latest
    container:
      image: fedora:latest
    timeout-minutes: 20
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install RPM Build Dependencies
        run: |
          dnf update -y
          dnf install -y rpm-build gcc-c++ gtk3-devel libusb1-devel libusb1 \
            pkgconf-pkg-config make ImageMagick desktop-file-utils \
            gtk-update-icon-cache which cmake ninja-build

      - name: Build RPM
        run: |
          chmod +x packaging/build-rpm.sh
          ./packaging/build-rpm.sh
          
      - name: Upload RPM Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sfd_tool_rpm_package
          path: |
            ~/rpmbuild/RPMS/*/*.rpm

  # ==================== Release Job ====================
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: [build-windows, build-macos, build-linux-deb, build-linux-rpm]
    steps:
      - name: Set Release Tag
        run: echo "RELEASE_TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          path: master

      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          path: output
          pattern: sfd_tool_*_Release
          merge-multiple: false

      - name: Download macOS DMG Artifact
        uses: actions/download-artifact@v4
        with:
          path: output
          pattern: sfd_tool_macos_dmg
          merge-multiple: false

      - name: Download Linux Artifacts
        uses: actions/download-artifact@v4
        with:
          path: output
          pattern: sfd_tool_linux_*
          merge-multiple: false

      - name: Download Linux RPM Artifacts
        uses: actions/download-artifact@v4
        with:
          path: output
          pattern: sfd_tool_rpm_package
          merge-multiple: false

      - name: Prepare Release Files
        run: |
          cd output

          # 重命名 Windows 目录
          if [ -d "sfd_tool_LibUSB_Release" ]; then
            mv sfd_tool_LibUSB_Release sfd_tool_windows_x64_libusb
            cp ../master/docs/VERSION_LOG.md sfd_tool_windows_x64_libusb/ 2>/dev/null || true
          fi

          if [ -d "sfd_tool_SPRD_Release" ]; then
            mv sfd_tool_SPRD_Release sfd_tool_windows_x64_sprd
            cp ../master/docs/VERSION_LOG.md sfd_tool_windows_x64_sprd/ 2>/dev/null || true
            cp ../master/third_party/Lib/Channel9.dll sfd_tool_windows_x64_sprd/ 2>/dev/null || true
            cp ../master/third_party/Lib/Channel.ini sfd_tool_windows_x64_sprd/ 2>/dev/null || true
          fi
          # 复制文档
          cp ../master/*.md . 2>/dev/null || true

          # 复制 Linux 包
          cp -r sfd_tool_linux_deb/*.deb . 2>/dev/null || true
          cp -r sfd_tool_rpm_package/*/*.rpm . 2>/dev/null || true

          # 复制 macOS DMG
          for dmg in sfd_tool_macos_dmg/*.dmg; do
            [ -f "$dmg" ] || continue
            cp "$dmg" "sfd_tool_macos_${{ env.RELEASE_TAG }}.dmg"
          done

          # 创建 Windows ZIP 包
          if [ -d "sfd_tool_windows_x64_sprd" ]; then
            zip -r sfd_tool_windows_x64_sprd_${{ env.RELEASE_TAG }}.zip sfd_tool_windows_x64_sprd
          fi

          if [ -d "sfd_tool_windows_x64_libusb" ]; then
            zip -r sfd_tool_windows_x64_libusb_${{ env.RELEASE_TAG }}.zip sfd_tool_windows_x64_libusb
          fi

          # 创建完整包（只打包最终发布文件，避免重复）
          mkdir -p all_in_one
          cp ARCHITECTURE.md all_in_one/ 2>/dev/null || true
          cp README*.md all_in_one/ 2>/dev/null || true
          cp *.deb all_in_one/ 2>/dev/null || true
          cp *.rpm all_in_one/ 2>/dev/null || true
          cp sfd_tool_macos_${{ env.RELEASE_TAG }}.dmg all_in_one/ 2>/dev/null || true
          cp sfd_tool_windows_x64_sprd_${{ env.RELEASE_TAG }}.zip all_in_one/ 2>/dev/null || true
          cp sfd_tool_windows_x64_libusb_${{ env.RELEASE_TAG }}.zip all_in_one/ 2>/dev/null || true

          cd all_in_one
          zip -r ../../sfd_tool_all_${{ env.RELEASE_TAG }}.zip .
          cd ..

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          name: sfd_tool ${{ env.RELEASE_TAG }}
          draft: false
          prerelease: false
          body: |
            ## sfd_tool Release ${{ env.RELEASE_TAG }}
            
            ### Windows 版本:
            - **sfd_tool_windows_x64_sprd**: Windows x64 版本，使用 SPRD 原生驱动（兼容性最好，无需额外驱动）
            - **sfd_tool_windows_x64_libusb**: Windows x64 版本，使用 libusb 驱动（支持热插拔，需安装驱动）
            
            ### 其他平台:
            - **sfd_tool_macos**: macOS 版本（DMG 包）
            - **Linux DEB 包**: Ubuntu/Debian 系统安装包
            - **Linux RPM 包**: Fedora/RPM-Based 系统安装包
            
            ### 使用说明:
            1. **Windows x64 (SPRD 版)**: 直接运行，使用系统自带的 SPRD 驱动
            2. **Windows x64 (libusb 版)**: 需要安装 libusb 驱动（可使用 Zadig 工具）
          files: |
            sfd_tool_all_${{ env.RELEASE_TAG }}.zip
            output/sfd_tool_windows_x64_sprd_${{ env.RELEASE_TAG }}.zip
            output/sfd_tool_windows_x64_libusb_${{ env.RELEASE_TAG }}.zip
            output/*.dmg
            output/*.deb
            output/*.rpm
