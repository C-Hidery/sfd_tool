name: Build sfd_tool

on:
  workflow_dispatch:
  push:
    branches:
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - master

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30
    env:
      VCPKG_ROOT: C:\vcpkg
    strategy:
      matrix:
        arch: [x64]
        config: [Release]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup MSVS
        uses: TheMrMilchmann/setup-msvc-dev@v3
        with:
          arch: ${{ matrix.arch }}

      - name: Cache vcpkg
        uses: actions/cache@v4
        with:
          path: |
            C:\vcpkg\installed
            C:\vcpkg\packages
            C:\vcpkg\downloads
          key: vcpkg-${{ runner.os }}-x64-windows-gettext-v1
          restore-keys: |
            vcpkg-${{ runner.os }}-x64-windows-gettext-

      - name: Install gettext (libintl) via vcpkg
        shell: pwsh
        run: |
          # 优先使用 GitHub 镜像自带的经典 vcpkg 实例
          $vcpkgExe = "C:\vcpkg\vcpkg.exe"
          if (-not (Test-Path $vcpkgExe)) {
            Write-Error "vcpkg.exe not found at $vcpkgExe"
            Get-ChildItem C:\ | Select-Object -First 20
            exit 1
          }
          Write-Host "Using vcpkg: $vcpkgExe"
          # 安装 x64 的 gettext（包含 libintl）
          & $vcpkgExe install gettext:x64-windows

      - name: Install MSYS2 and GTK3
        run: |
          # GitHub Actions Windows 镜像已预装 MSYS2
          $msysPath = "C:\msys64"

          Write-Host "安装 GTK3 开发包..."

          # 更新软件包数据库（不做完整滚动升级）
          & "$msysPath\usr\bin\bash.exe" -lc "pacman -Sy --noconfirm"

          # 安装 x64 GTK3 完整开发包（仅安装缺失的包）
          Write-Host "安装 x64 GTK3 完整开发包..."
          & "$msysPath\usr\bin\bash.exe" -lc "pacman -S --noconfirm --needed mingw-w64-x86_64-gtk3 mingw-w64-x86_64-harfbuzz mingw-w64-x86_64-pango mingw-w64-x86_64-cairo mingw-w64-x86_64-glib2"

      - name: Create Build Directory
        run: New-Item -ItemType Directory -Force -Path ./build/${{ matrix.arch }}/${{ matrix.config }}/

      - name: Configure (CMake)
        shell: pwsh
        run: |
          $platform = if ("${{ matrix.arch }}" -eq "x64") { "x64" } else { "Win32" }
          $useLibusb = if ("${{ matrix.arch }}" -eq "x64") { "ON" } else { "OFF" }

          cmake -S . -B build_cmake `
            -G "Visual Studio 17 2022" `
            -A $platform `
            -DCMAKE_TOOLCHAIN_FILE="C:/vcpkg/scripts/buildsystems/vcpkg.cmake" `
            -DCMAKE_EXPORT_COMPILE_COMMANDS=ON `
            -DUSE_GTK=ON `
            -DUSE_LIBUSB=$useLibusb `
            -DSFD_ENABLE_TESTS=ON

      - name: Build sfd_tool (CMake) (${{ matrix.arch }} - ${{ matrix.config }})
        shell: pwsh
        run: |
          # 确保在运行单元测试前，GTK3 和 libintl 等 DLL 在 PATH 中
          $env:Path = "C:\msys64\mingw64\bin;C:\vcpkg\installed\x64-windows\bin;" + $env:Path

          cmake --build build_cmake --config ${{ matrix.config }} -- /m
          ctest --test-dir build_cmake -C ${{ matrix.config }} --output-on-failure

          # 将生成的可执行文件复制到与原来相同的目录结构，方便后续打包
          New-Item -ItemType Directory -Force -Path ./build/${{ matrix.arch }}/${{ matrix.config }}/ | Out-Null
          Copy-Item "build_cmake/${{ matrix.config }}/sfd_tool.exe" "./build/${{ matrix.arch }}/${{ matrix.config }}/" -Force

      - name: Verify GTK3 DLLs Exist
        run: |
          if ("${{ matrix.arch }}" -eq "x64") {
            $gtkBinPath = "C:\msys64\mingw64\bin"
          } else {
            $gtkBinPath = "C:\msys64\mingw32\bin"
          }
          
          Write-Host "检查 GTK3 DLL 路径: $gtkBinPath"
          
          if (Test-Path $gtkBinPath) {
            $dlls = Get-ChildItem -Path $gtkBinPath -Filter "*.dll" | Select-Object -First 10
            Write-Host "找到 $(@($dlls).Count) 个 DLL 文件"
            foreach ($dll in $dlls) {
              Write-Host "  - $($dll.Name)"
            }
          } else {
            Write-Error "GTK3 bin 目录不存在: $gtkBinPath"
          }

      - name: Copy ALL DLLs from GTK3 bin directory
        run: |
          $destDir = "./build/${{ matrix.arch }}/${{ matrix.config }}/"
          
          # 确定 GTK3 bin 目录
          $gtkBinPath = "C:\msys64\mingw64\bin"
          
          Write-Host "复制所有 DLL 从: $gtkBinPath"
          Write-Host "复制到: $destDir"
          
          # 检查源目录是否存在
          if (-not (Test-Path $gtkBinPath)) {
            Write-Error "GTK3 bin 目录不存在: $gtkBinPath"
            exit 1
          }
          
          # 复制所有 DLL 文件
          $dllFiles = Get-ChildItem -Path $gtkBinPath -Filter "*.dll"
          
          if ($dllFiles.Count -eq 0) {
            Write-Warning "没有找到 DLL 文件！"
            Write-Host "目录内容:"
            Get-ChildItem -Path $gtkBinPath | Select-Object -First 20
          } else {
            foreach ($dll in $dllFiles) {
              Copy-Item $dll.FullName -Destination $destDir -Force
            }
            Write-Host "已复制 $($dllFiles.Count) 个 DLL 文件"
            
            # 显示前10个复制的文件
            Write-Host "前10个 DLL 文件:"
            $dllFiles | Select-Object -First 10 Name | ForEach-Object { Write-Host "  - $($_.Name)" }
          }
      - name: Copy GTK Runtime Data Files
        run: |
          $destDir = "./build/${{ matrix.arch }}/${{ matrix.config }}/"
          
          # 确定 MSYS2 目录
          $msysPrefix = "C:\msys64\mingw64"
          
          Write-Host "复制 GTK 运行时数据文件..."
          
          # 1. 复制图标主题
          $iconsSrc = "$msysPrefix\share\icons"
          $iconsDest = "$destDir\share\icons"
          
          if (Test-Path $iconsSrc) {
            New-Item -ItemType Directory -Force -Path $iconsDest
            
            # 复制 hicolor 主题（必需）
            if (Test-Path "$iconsSrc\hicolor") {
              Write-Host "复制 hicolor 图标主题..."
              Copy-Item -Path "$iconsSrc\hicolor" -Destination $iconsDest -Recurse -Force
            }
            
            # 复制 Adwaita 主题（推荐）
            if (Test-Path "$iconsSrc\Adwaita") {
              Write-Host "复制 Adwaita 图标主题..."
              Copy-Item -Path "$iconsSrc\Adwaita" -Destination $iconsDest -Recurse -Force
            }
          } else {
            Write-Warning "图标主题目录不存在: $iconsSrc"
          }
          
          # 2. 复制 GSettings schemas
          $schemasSrc = "$msysPrefix\share\glib-2.0\schemas"
          $schemasDest = "$destDir\share\glib-2.0\schemas"
          
          if (Test-Path $schemasSrc) {
            Write-Host "复制 GSettings schemas..."
            New-Item -ItemType Directory -Force -Path $schemasDest
            Copy-Item -Path "$schemasSrc\*" -Destination $schemasDest -Recurse -Force
          } else {
            Write-Error "GSettings schemas 目录不存在: $schemasSrc"
          }
          
          # 3. 复制主题
          $themesSrc = "$msysPrefix\share\themes"
          $themesDest = "$destDir\share\themes"
          
          if (Test-Path $themesSrc) {
            Write-Host "复制 GTK 主题..."
            New-Item -ItemType Directory -Force -Path $themesDest
            Copy-Item -Path "$themesSrc\Default" -Destination $themesDest -Recurse -Force -ErrorAction SilentlyContinue
          }
      - name: Cleanup Build Directory (Optional)
        run: |
          $destDir = "./build/${{ matrix.arch }}/${{ matrix.config }}/"
                
           # 删除不需要的大文件（可选）
          $unwantedExtensions = @(
            ".exe",    # 可执行文件（除了我们的）
            ".a",      # 静态库
            ".la",     # libtool 文件
            ".def",    # 导出定义
            ".sh",     # shell 脚本
            ".py",     # python 脚本
            ".pl"      # perl 脚本
           )
                
          # 保留我们的可执行文件
          $keepFiles = @("sfd_tool.exe", "sfd_tool.pdb")
                
          foreach ($ext in $unwantedExtensions) {
            Get-ChildItem -Path $destDir -Filter "*$ext" -Exclude $keepFiles | Remove-Item -Force -ErrorAction SilentlyContinue
          }
                
          Write-Host "清理后文件统计:"
          $totalFiles = (Get-ChildItem -Path $destDir).Count
          $totalSize = (Get-ChildItem -Path $destDir | Measure-Object -Property Length -Sum).Sum / 1MB
          Write-Host "  文件数量: $totalFiles"
          Write-Host "  总大小: $([math]::Round($totalSize, 2)) MB"


      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sfd_tool_${{ matrix.arch }}_${{ matrix.config }}
          path: ./build/${{ matrix.arch }}/${{ matrix.config }}/

  build-macos:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install macOS Build Dependencies
        run: |
          brew update
          brew install gtk+3 libusb gettext cmake ninja || true

      - name: Configure (CMake)
        run: |
          mkdir -p build_cmake
          cmake -S . -B build_cmake \
            -G "Ninja" \
            -DCMAKE_BUILD_TYPE=Release \
            -DUSE_GTK=ON \
            -DUSE_LIBUSB=ON \
            -DSFD_ENABLE_TESTS=ON

      - name: Build and Test (CMake)
        run: |
          cmake --build build_cmake --config Release -- -j$(sysctl -n hw.logicalcpu)
          ctest --test-dir build_cmake -C Release --output-on-failure

      - name: Prepare macOS bundle directory
        run: |
          mkdir -p dist/macos
          cp build_cmake/sfd_tool dist/macos/
          cp README*.md dist/macos/ 2>/dev/null || true
          cp LICENSE.txt dist/macos/ 2>/dev/null || true

      - name: Create DMG
        run: |
          hdiutil create -volname "sfd_tool_macos" -srcfolder dist/macos -ov -format UDZO sfd_tool_macos.dmg

      - name: Upload macOS DMG Artifact
        uses: actions/upload-artifact@v4
        with:
          name: sfd_tool_macos_dmg
          path: sfd_tool_macos.dmg

  build-linux-deb:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Linux Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential debhelper devscripts \
            libgtk-3-dev libusb-1.0-0-dev pkg-config g++ \
            imagemagick desktop-file-utils cmake

      - name: Make build-deb.sh executable
        run: chmod +x packaging/build-deb.sh

      - name: Build Linux Package
        run: |
          # 设置环境变量以避免警告
          export DEBFULLNAME="RyanCrepa"
          export DEBEMAIL="Ryan110413@outlook.com"
          
          # 运行构建脚本
          ./packaging/build-deb.sh
          DEB_FILE=$(find /tmp/build-sfd-tool/ -name '*.deb' | head -1)
          
      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sfd_tool_linux_deb
          path: |
            /tmp/build-sfd-tool/*.deb
            /tmp/build-sfd-tool/*.rpm
            /tmp/build-sfd-tool/*.changes
            /tmp/build-sfd-tool/*.buildinfo
            /tmp/build-sfd-tool/*.dsc
  build-linux-rpm:
    runs-on: ubuntu-latest
    container:
      image: fedora:latest
    timeout-minutes: 20
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install RPM Build Dependencies
        run: |
          dnf update -y
          dnf search libusb
          dnf install -y rpm-build gcc-c++ gtk3-devel libusb1-devel libusb1\
            pkgconf-pkg-config make ImageMagick desktop-file-utils \
            gtk-update-icon-cache which cmake ninja-build


      - name: Build Rpm
        run: |
          chmod +x packaging/build-rpm.sh
          ./packaging/build-rpm.sh
      - name: Upload RPM Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sfd_tool_rpm_package
          path: |
            ~/rpmbuild/RPMS/*/*.rpm
  release:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: [build-windows, build-macos, build-linux-deb, build-linux-rpm]
    steps:
      - name: Set Release Tag
        run: echo "RELEASE_TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          path: master

      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          path: output
          pattern: sfd_tool_*_Release

      - name: Download macOS DMG Artifact
        uses: actions/download-artifact@v4
        with:
          path: output
          pattern: sfd_tool_macos_dmg

      - name: Download Deb Linux Artifact
        uses: actions/download-artifact@v4
        with:
          path: output
          pattern: sfd_tool_linux_deb
      - name: Download Rpm Linux Package
        uses: actions/download-artifact@v4
        with:
          path: output
          pattern: sfd_tool_rpm_package
      - name: Prepare Release Files
        run: |
          # 处理 Windows 文件
          cp master/*.md output/
          cp master/third_party/Lib/libusb-1.0.dll output/sfd_tool_x64_Release/

          # 重命名 Windows 目录
          cd output
          mv sfd_tool_x64_Release sfd_tool_LibUSB_Release
          
          # 创建 ZIP 包
          zip -r -v ../${{ env.RELEASE_TAG }}.zip .

          # 复制 Linux 包
          cp -r sfd_tool_linux_deb/*.deb .
          cp -r sfd_tool_rpm_package/*/*.rpm .
          # 复制 macOS DMG
          cp -r sfd_tool_macos_dmg/*.dmg .

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          tag_name: ${{ env.RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          name: sfd_tool ${{ env.RELEASE_TAG }}
          draft: false
          prerelease: false
          body: |
            ## sfd_tool Release

            ### 版本说明:
            - **sfd_tool_LibUSB_Release**: Windows x64 版本，使用 libusb 驱动
            - **sfd_tool_macos**: macOS 版本（DMG 包）
            - **Linux DEB 包**: Ubuntu/Debian 系统安装包
            - **Linux RPM 包**: Fedora/RPM-Based 系统安装包

            ### 使用说明:
            1. Windows x64 版本需要 libusb 驱动
            2. macOS 版本需要已安装 GTK3 与 libusb 运行时（见项目 README）

            ### 文件列表:
            - sfd_tool.exe - Windows 主程序
            - sfd_tool - Linux 主程序
            - *.dll - Windows 运行时依赖库
            - *.deb/*.rpm - Linux 安装包
            - README.md - 说明文档
          files: |
            ${{ env.RELEASE_TAG }}.zip
            output/*.deb
            output/*.rpm
            output/*.dmg